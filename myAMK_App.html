const storage = {
  get: (key) => { try { const v=localStorage.getItem("myamk_"+key); return v?JSON.parse(v):null; } catch(e){return null;} },
  set: (key,val) => { try { localStorage.setItem("myamk_"+key,JSON.stringify(val)); } catch(e){} },
  del: (key) => { try { localStorage.removeItem("myamk_"+key); } catch(e){} },
  // Save ALL app data as one JSON file for backup/Google Drive
  exportAll: () => {
    const allData={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k.startsWith("myamk_")) allData[k]=localStorage.getItem(k);
    }
    const blob=new Blob([JSON.stringify(allData,null,2)],{type:"application/json"});

    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    return true;
  },
  // Import ALL data from backup file
  importAll: (file) => {
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=(e)=>{
        try{
          const data=JSON.parse(e.target.result);
          Object.entries(data).forEach(([k,v])=>{localStorage.setItem(k,v);});
          resolve(Object.keys(data).length);
        }catch(err){reject(err);}
      };
      reader.onerror=reject;
      reader.readAsText(file);
    });
  }

function calcCartaAlir(f){const d=f.dataAsas,k=f.kematian,t=f.tempohGuna;const bibit=n(d.purataBibit),pejantan=n(d.purataJantan),jAnak=n(d.jAnak_J)+n(d.jAnak_B);const mati6=n(k.anakJ_6)+n(k.anakB_6),mati12=n(k.anakJ_12)+n(k.anakB_12),totalMatiAnak=mati6+mati12;const A=1,B=n(t.bibit)>0?A/n(t.bibit):0;const kadarHidupBibit=bibit>0?1-(n(k.induk)/bibit):1;const C=B*kadarHidupBibit;const D=bibit>0?pejantan/bibit:0;const E=n(t.pejantan)>0?D/n(t.pejantan):0;const kadarHidupPejantan=pejantan>0?1-(n(k.pejantan)/pejantan):1;const F=E*kadarHidupPejantan;const G_val=bibit>0?jAnak/bibit:0;const H=G_val*(1-(jAnak>0?mati6/jAnak:0));const I=H*(1-(jAnak>0?mati12/jAnak:0));const ratioJ=jAnak>0?n(d.jAnak_J)/jAnak:0.5;const J=I*ratioJ,K=I-J;const L=K>B?K-B:0;const M=K<B?K:B,N_val=K>=B?0:B-K;return{A,B,C,D,E,F,G:G_val,H,I,J,K,L,M,N:N_val,bibit,pejantan,jAnak,totalMatiAnak,mati6,mati12,kadarMati:jAnak>0?totalMatiAnak/jAnak:0,kadarHidup:jAnak>0?1-totalMatiAnak/jAnak:1};}

function calcAMK(f,ca){const bibit=n(f.dataAsas.purataBibit),showTenusu=isTenusu(f.bidangUsaha);let hasilItems=[];
if(ca.J>0&&n(f.hasil.hargaJ)>0)hasilItems.push({nama:"ANAK JANTAN MUDA",unit:"EKOR",qty:ca.J,harga:n(f.hasil.hargaJ),jumlah:ca.J*n(f.hasil.hargaJ)});
if(ca.L>0&&n(f.hasil.hargaB)>0)hasilItems.push({nama:"ANAK BETINA MUDA (JUALAN)",unit:"EKOR",qty:ca.L,harga:n(f.hasil.hargaB),jumlah:ca.L*n(f.hasil.hargaB)});
if(ca.C>0&&n(f.hasil.hargaBibitTakai)>0)hasilItems.push({nama:"BIBIT TAKAI",unit:"EKOR",qty:ca.C,harga:n(f.hasil.hargaBibitTakai),jumlah:ca.C*n(f.hasil.hargaBibitTakai)});
if(ca.F>0&&n(f.hasil.hargaPejantanTakai)>0)hasilItems.push({nama:"PEJANTAN TAKAI",unit:"EKOR",qty:ca.F,harga:n(f.hasil.hargaPejantanTakai),jumlah:ca.F*n(f.hasil.hargaPejantanTakai)});
const tj=n(f.hasil.tinja_kg)*n(f.hasil.tinja_harga);if(tj>0)hasilItems.push({nama:"JUALAN TINJA",unit:"KG/THN",qty:n(f.hasil.tinja_kg)/Math.max(bibit,1),harga:n(f.hasil.tinja_harga),jumlah:tj/Math.max(bibit,1)});
if(showTenusu&&n(f.tenusu.susuTahun)>0){const sp=bibit>0?n(f.tenusu.susuTahun)/bibit:0;hasilItems.push({nama:"JUALAN SUSU",unit:"LITER",qty:sp,harga:n(f.tenusu.hargaSusu),jumlah:sp*n(f.tenusu.hargaSusu)});}
(f.hasil.extra||[]).forEach(ex=>{const q=n(ex.qty),h=n(ex.harga),j=q*h;if(j>0)hasilItems.push({nama:(ex.nama||"TAMBAHAN").toUpperCase(),unit:(ex.unit||"UNIT").toUpperCase(),qty:q/Math.max(bibit,1),harga:h,jumlah:j/Math.max(bibit,1)});});
const totalHasil=hasilItems.reduce((s,i)=>s+i.jumlah,0);
let kb1Items=[];
if(ca.B>0&&n(f.kb1.hargaBibitGanti)>0)kb1Items.push({nama:"BIBIT GANTIAN",unit:"EKOR",qty:ca.B,harga:n(f.kb1.hargaBibitGanti),jumlah:ca.B*n(f.kb1.hargaBibitGanti)});
if(ca.E>0&&n(f.kb1.hargaPejantanGanti)>0)kb1Items.push({nama:"PEJANTAN GANTIAN",unit:"EKOR",qty:ca.E,harga:n(f.kb1.hargaPejantanGanti),jumlah:ca.E*n(f.kb1.hargaPejantanGanti)});
[{nm:"PELLET",kg:"pellet_kg",rm:"pellet_rm"},{nm:"RUMPUT/NAPIER",kg:"rumput_kg",rm:"rumput_rm"},{nm:"JAGUNG",kg:"jagung_kg",rm:"jagung_rm"},{nm:"SOYA",kg:"soya_kg",rm:"soya_rm"},{nm:"DEDAK",kg:"dedak_kg",rm:"dedak_rm"}].forEach(fd=>{const kg=n(f.kb1[fd.kg]),rm=n(f.kb1[fd.rm]);if(kg>0&&rm>0)kb1Items.push({nama:`KOS ${fd.nm}`,unit:"KG/THN",qty:kg,harga:rm,jumlah:bibit>0?(kg*rm)/bibit:0});});
(f.kb1.extra||[]).forEach(ex=>{const q=n(ex.qty),h=n(ex.harga),j=q*h;if(j>0)kb1Items.push({nama:(ex.nama||"TAMBAHAN").toUpperCase(),unit:(ex.unit||"UNIT").toUpperCase(),qty:q,harga:h,jumlah:bibit>0?j/bibit:0});});
const totalKB1=kb1Items.reduce((s,i)=>s+i.jumlah,0),MK1=totalHasil-totalKB1;
let kb2Items=[];
[{nm:"GARAM & VITAMIN",key:"garam"},{nm:"RAWATAN & UBATAN",key:"rawatan"},{nm:"BIL UTILITI",key:"utiliti"},{nm:"PEMBAIKAN & ALAT GANTI",key:"pembaikan"},{nm:"UPAH BURUH",key:"upah"},{nm:"PELBAGAI",key:"pelbagai"}].forEach(fd=>{const v=n(f.kb2[fd.key]);if(v>0)kb2Items.push({nama:fd.nm,unit:"L/S",qty:1,harga:v,jumlah:bibit>0?v/bibit:0});});
(f.kb2.extra||[]).forEach(ex=>{const j=n(ex.jumlah);if(j>0)kb2Items.push({nama:(ex.nama||"TAMBAHAN").toUpperCase(),unit:"L/S",qty:1,harga:j,jumlah:bibit>0?j/bibit:0});});
const totalKB2=kb2Items.reduce((s,i)=>s+i.jumlah,0),MK2=MK1-totalKB2;
const jamPerHari=n(f.buruh.jam),tenagaBuruh=bibit>0?(365*jamPerHari)/bibit:0;
const mkJam=tenagaBuruh>0?MK2/tenagaBuruh:0,pendapatanLadang=MK2*bibit,pendapatanBulanan=pendapatanLadang/12;
const susuPerInduk=bibit>0?n(f.tenusu.susuTahun)/bibit:0;
const COPraw=totalKB1+totalKB2;
const COP=showTenusu&&susuPerInduk>0?COPraw/susuPerInduk:COPraw;
return{hasilItems,totalHasil,kb1Items,totalKB1,MK1,kb2Items,totalKB2,MK2,tenagaBuruh,mkJam,pendapatanLadang,pendapatanBulanan,COP};}

  <Card title="TENAGA BURUH & INFRASTRUKTUR" icon="👷" accent={P[500]}><div style={g2}><Field label="BURUH KELUARGA" value={f.buruh.orang} onChange={v=>up("buruh","orang",v)} unit="ORANG"/><Field label="JAM BEKERJA/HARI" value={f.buruh.jam} onChange={v=>up("buruh","jam",v)} unit="JAM"/></div>

const Tbl=({items,title,total,bg})=>(<div style={{marginBottom:10}}>

    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1.2fr",padding:"8px",background:`linear-gradient(135deg,${P[100]},${P[200]})`,fontWeight:700,fontSize:11,textTransform:"uppercase"}}><span>JUMLAH</span><span/><span/><span/><span style={{color:P[800]}}>{fmtRM(total)}</span></div>

// INDEKS LADANG - multi-year from saved farms
const IndeksLadang=({farm,allFarms,user})=>{
  const b=farm.bidangUsaha,ik=INDEKS_KEBANGSAAN_DATA[b];
  const [indeksYears,setIndeksYears]=useState([]);
  const [showExport,setShowExport]=useState(false);
  const [showAddPanel,setShowAddPanel]=useState(false);
  const [sentMsg,setSentMsg]=useState("");

  useEffect(()=>{if(!user||!b)return;(async()=>{const d=await loadData(`myamk-indeks-${user.username}-${b}`);if(d)setIndeksYears(d);else setIndeksYears([]);})();},[user,b]);
  const saveIndeks=async(data)=>{setIndeksYears(data);await saveData(`myamk-indeks-${user.username}-${b}`,data);};

  const buildParams=(f)=>{const ca=calcCartaAlir(f),amk=calcAMK(f,ca);const bibit=n(f.dataAsas.purataBibit),jAnak=n(f.dataAsas.jAnak_J)+n(f.dataAsas.jAnak_B);const tM=n(f.kematian.anakJ_6)+n(f.kematian.anakJ_12)+n(f.kematian.anakB_6)+n(f.kematian.anakB_12);
    let lp=[1,bibit,bibit>0?jAnak/bibit*100:0];
    if(isKecil(b))lp.push(0);
    lp.push(n(f.dataAsas.selangKelahiran),jAnak>0?tM/jAnak*100:0,n(f.dataAsas.beratJ),n(f.hasil.hargaJ),n(f.dataAsas.beratB),n(f.hasil.hargaB));
    if(isTenusu(b))lp.push(bibit>0?n(f.tenusu.susuTahun)/bibit:0,n(f.tenusu.hargaSusu));
    lp.push(amk.totalHasil,amk.totalKB1,amk.MK1,amk.totalKB2,amk.MK2,amk.mkJam,amk.pendapatanLadang,amk.pendapatanBulanan);
    return lp;};

  const paramNames=(()=>{let p=["BILANGAN LADANG","PURATA BILANGAN BIBIT","PURATA KADAR KELAHIRAN ANAK"];
    if(isKecil(b))p.push("PURATA KADAR KEMBAR");
    p.push("PURATA SELANG KELAHIRAN","PURATA KADAR KEMATIAN ANAK","PURATA BERAT ANAK JANTAN 1 TAHUN","PURATA HARGA ANAK JANTAN 1 TAHUN","PURATA BERAT ANAK BETINA 1 TAHUN","PURATA HARGA ANAK BETINA 1 TAHUN");
    if(isTenusu(b))p.push("PURATA PENGELUARAN SUSU","PURATA HARGA JUALAN SUSU");
    p.push("PURATA HASIL LADANG","PURATA KOS BERUBAH 1","PURATA MARGIN KASAR 1","PURATA KOS BERUBAH 2","PURATA MARGIN KASAR 2","PURATA MARGIN KASAR / JAM","PURATA PENDAPATAN TAHUNAN LADANG","PURATA PENDAPATAN BULANAN LADANG");
    return p;})();

  const paramUnits=(()=>{let u=["BUAH","EKOR/LADANG","%"];
    if(isKecil(b))u.push("%");
    u.push("HARI","%","KG/EKOR","RM/EKOR","KG/EKOR","RM/EKOR");
    if(isTenusu(b))u.push("LITER/BIBIT/TAHUN","RM/LITER");
    u.push("RM/BIBIT/TAHUN","RM/BIBIT/TAHUN","RM/BIBIT/TAHUN","RM/BIBIT/TAHUN","RM/BIBIT/TAHUN","RM/JAM","RM/LADANG","RM/LADANG");
    return u;})();

  const currentVals=buildParams(farm);

  // Get matching farms (same bidangUsaha) for selection
  const matchingFarms=(allFarms||[]).filter(f=>f.bidangUsaha===b);

  const addFromFarm=(f)=>{
    const vals=buildParams(f);
    const label=`${f.nama||"LADANG"} (${f.tahun})`;
    saveIndeks([...indeksYears,{tahun:label,vals}]);
    setShowAddPanel(false);
  };

  const deleteYear=(idx)=>{const ny=[...indeksYears];ny.splice(idx,1);saveIndeks(ny);};

  // HANTAR KE ADMIN - export fail JSON untuk dihantar via email/WhatsApp
  const hantarKeAdmin=()=>{
    const allVals=[{tahun:`${farm.nama||"LADANG"} (${farm.tahun})`,vals:currentVals},...indeksYears];
    const sub={id:Date.now().toString(),username:user.username,nama:user.nama,bidangUsaha:b,tahun:farm.tahun,farmNama:farm.nama,submittedAt:new Date().toISOString(),indeksData:allVals,paramNames,paramUnits};
    const blob=new Blob([JSON.stringify(sub,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`INDEKS_${user.nama||user.username}_${b.replace(/[^a-zA-Z0-9]/g,"_")}_${farm.tahun}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    setSentMsg("✓ FAIL INDEKS BERJAYA DIMUAT TURUN! HANTAR KE ADMIN MELALUI EMAIL / WHATSAPP / GOOGLE DRIVE.");
    setTimeout(()=>setSentMsg(""),5000);
  };

  // Average across all columns (current + saved)
  const allYearVals=[currentVals,...indeksYears.map(y=>y.vals)];
  const avgVals=paramNames.map((_,pi)=>{const vals=allYearVals.map(y=>y[pi]||0);return vals.reduce((a,b2)=>a+b2,0)/vals.length;});

  return(<div>
    <Card title="INDEKS LADANG" icon="📊" accent={P[600]}>
      <div style={{fontSize:11,color:"#888",marginBottom:6}}>BIDANG: <strong style={{color:P[700]}}>{b||"BELUM DIPILIH"}</strong></div>
      {b?<>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          <button onClick={()=>setShowAddPanel(!showAddPanel)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${P[500]},${P[600]})`,color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer"}}>+ TAMBAH INDEKS</button>
          <button onClick={hantarKeAdmin} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>📤 HANTAR KE ADMIN</button>
          <button onClick={()=>setShowExport(!showExport)} style={{padding:"6px 14px",borderRadius:8,border:`2px solid ${P[300]}`,background:"transparent",color:P[600],fontWeight:600,fontSize:10,cursor:"pointer"}}>EKSPORT</button>
        </div>
        {sentMsg&&<div style={{background:sentMsg.includes("✓")?"#dcfce7":"#fee2e2",border:`1px solid ${sentMsg.includes("✓")?"#86efac":"#fca5a5"}`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:10,fontWeight:600,color:sentMsg.includes("✓")?"#166534":"#991b1b"}}>{sentMsg}</div>}

        {/* Panel pilih data ladang untuk tambah indeks */}
        {showAddPanel&&<div style={{background:P[50],borderRadius:10,padding:12,marginBottom:10,border:`1px solid ${P[200]}`}}>
          <div style={{fontSize:10,fontWeight:700,color:P[700],marginBottom:8}}>PILIH DATA LADANG UNTUK DIJADIKAN INDEKS:</div>
          {matchingFarms.length===0?<div style={{fontSize:9,color:"#888"}}>TIADA REKOD LADANG DENGAN BIDANG USAHA INI.</div>:
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {matchingFarms.map(f=>(<button key={f.id} onClick={()=>addFromFarm(f)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,border:`1px solid ${P[200]}`,background:"#fff",cursor:"pointer",textAlign:"left"}}>
              <div><div style={{fontSize:10,fontWeight:600,color:P[800]}}>{f.nama||"TANPA NAMA"}</div><div style={{fontSize:8,color:"#888"}}>{f.bidangUsaha} • TAHUN: {f.tahun} • BULAN: {f.bulan}</div></div>
              <span style={{fontSize:9,color:P[500],fontWeight:700}}>PILIH →</span>
            </button>))}
          </div>}
          <button onClick={()=>setShowAddPanel(false)} style={{marginTop:8,padding:"5px 12px",borderRadius:6,border:`1px solid ${P[300]}`,background:"transparent",color:P[600],fontWeight:600,fontSize:9,cursor:"pointer"}}>TUTUP</button>
        </div>}

        {showExport&&<ExportPanel farm={farm} page="indeks"/>}

        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:9,minWidth:500}}>
          <thead><tr style={{background:`linear-gradient(135deg,${P[100]},${P[200]})`}}>
            <th style={{padding:"6px 4px",textAlign:"left",color:P[800]}}>NO</th>
            <th style={{padding:"6px 4px",textAlign:"left",color:P[800]}}>PARAMETER</th>
            <th style={{padding:"6px 4px",textAlign:"left",color:P[800]}}>UNIT</th>
            <th style={{padding:"6px 4px",textAlign:"right",color:P[800],whiteSpace:"nowrap"}}>{farm.nama||"LADANG"} ({farm.tahun})</th>
            {indeksYears.map((y,i)=>(<th key={i} style={{padding:"6px 4px",textAlign:"right",color:P[700],whiteSpace:"nowrap"}}>{y.tahun} <button onClick={()=>deleteYear(i)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:8}}>✕</button></th>))}
            {indeksYears.length>0&&<th style={{padding:"6px 4px",textAlign:"right",color:"#ea580c",whiteSpace:"nowrap"}}>PURATA</th>}
            {ik&&<th style={{padding:"6px 4px",textAlign:"right",color:"#16a34a",whiteSpace:"nowrap"}}>INDEKS KEB. {ik.tahun}</th>}
          </tr></thead>
          <tbody>{paramNames.map((p,i)=>(<tr key={i} style={{borderBottom:`1px solid ${P[50]}`,background:i%2===0?"#fff":P[50]}}>
            <td style={{padding:"5px 4px"}}>{i+1}</td>
            <td style={{padding:"5px 4px",fontWeight:500}}>{p}</td>
            <td style={{padding:"5px 4px",color:"#888"}}>{paramUnits[i]}</td>
            <td style={{padding:"5px 4px",textAlign:"right",fontWeight:700,color:P[700]}}>{fmt(currentVals[i])}</td>
            {indeksYears.map((y,yi)=>(<td key={yi} style={{padding:"5px 4px",textAlign:"right",fontWeight:600,color:P[500]}}>{fmt(y.vals[i]||0)}</td>))}
            {indeksYears.length>0&&<td style={{padding:"5px 4px",textAlign:"right",fontWeight:700,color:"#ea580c"}}>{fmt(avgVals[i])}</td>}
            {ik&&<td style={{padding:"5px 4px",textAlign:"right",fontWeight:700,color:"#16a34a"}}>{ik.params[i]?fmt(ik.params[i].v):"-"}</td>}
          </tr>))}</tbody>
        </table></div>
      </>:<p style={{textAlign:"center",color:"#aaa",padding:16}}>SILA PILIH BIDANG USAHA DI DATA TERNAKAN.</p>}
    </Card>
  </div>);
};

// EXPORT PANEL (change #13)
const ExportPanel=({farm,page})=>{
  const [exporting,setExporting]=useState(false);
  const exportData=(pages)=>{
    setExporting(true);
    const data={exportDate:new Date().toISOString(),farm:{nama:farm.nama,bidangUsaha:farm.bidangUsaha,tahun:farm.tahun}};
    if(pages.includes("data"))data.dataTernakan=farm;
    if(pages.includes("carta"))data.cartaAlir=calcCartaAlir(farm);
    if(pages.includes("amk")){const ca=calcCartaAlir(farm);data.kiraanAMK=calcAMK(farm,ca);}
    if(pages.includes("indeks"))data.indeksLadang=true;
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`myAMK_${farm.nama||"export"}_${farm.tahun}.json`;a.click();URL.revokeObjectURL(url);
    setTimeout(()=>setExporting(false),1000);
  };
  return(<div style={{background:P[50],borderRadius:10,padding:12,marginBottom:10,border:`1px solid ${P[200]}`}}>
    <div style={{fontSize:10,fontWeight:700,color:P[700],marginBottom:8}}>PILIH DATA UNTUK EKSPORT:</div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      <button onClick={()=>exportData(["data"])} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${P[300]}`,background:"#fff",color:P[700],fontSize:9,fontWeight:600,cursor:"pointer"}}>DATA TERNAKAN</button>
      <button onClick={()=>exportData(["carta"])} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${P[300]}`,background:"#fff",color:P[700],fontSize:9,fontWeight:600,cursor:"pointer"}}>CARTA ALIR</button>
      <button onClick={()=>exportData(["amk"])} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${P[300]}`,background:"#fff",color:P[700],fontSize:9,fontWeight:600,cursor:"pointer"}}>AMK</button>
      <button onClick={()=>exportData(["indeks"])} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${P[300]}`,background:"#fff",color:P[700],fontSize:9,fontWeight:600,cursor:"pointer"}}>INDEKS</button>
      <button onClick={()=>exportData(["data","carta","amk","indeks"])} style={{padding:"5px 10px",borderRadius:6,border:"none",background:`linear-gradient(135deg,${P[500]},${P[700]})`,color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>EKSPORT SEMUA</button>
    </div>
    {exporting&&<div style={{fontSize:9,color:G.ok,marginTop:6,fontWeight:600}}>✓ DATA BERJAYA DIEKSPORT</div>}
  </div>);
};

// INDEKS KEBANGSAAN - admin: add/delete years, compile from users (changes #11,#12,#14)
const IndeksKebangsaan=({user})=>{
  const [sel,setSel]=useState("");
  const [customIndeks,setCustomIndeks]=useState({});
  const [showAdd,setShowAdd]=useState(false);
  const [newYear,setNewYear]=useState("");
  const [newVals,setNewVals]=useState([]);
  const [showExport,setShowExport]=useState(false);
  const [compileResult,setCompileResult]=useState(null);
  const [submissions,setSubmissions]=useState([]);
  const [showSubmissions,setShowSubmissions]=useState(false);
  const [sentImportMsg,setSentImportMsg]=useState("");

  // Load custom indeks & submissions
  useEffect(()=>{(async()=>{
    const d=await loadData("myamk-indeks-kebangsaan-custom");if(d)setCustomIndeks(d);
    const s=await loadData("myamk-submissions-shared");if(s)setSubmissions(s);
  })();},[]);
  const saveCustom=async(d)=>{setCustomIndeks(d);await saveData("myamk-indeks-kebangsaan-custom",d);};

  const allBidang=Object.keys(INDEKS_KEBANGSAAN_DATA);
  const baseData=sel?INDEKS_KEBANGSAAN_DATA[sel]:null;
  const customForBidang=sel?(customIndeks[sel]||[]):[];

  const addNewIndeks=async()=>{if(!newYear||!sel)return;
    const vals=baseData?baseData.params.map(()=>0):[];
    const entry={tahun:parseInt(newYear),params:baseData?baseData.params.map((p,i)=>({...p,v:n(newVals[i])||0})):[]};
    const updated={...customIndeks,[sel]:[...(customIndeks[sel]||[]),entry]};
    await saveCustom(updated);setShowAdd(false);setNewYear("");setNewVals([]);};

  const deleteCustomIndeks=async(idx)=>{const updated={...customIndeks,[sel]:customForBidang.filter((_,i)=>i!==idx)};await saveCustom(updated);};

  // Compile from all users (change #14)
  const compileFromUsers=async()=>{
    try{
      const allUsers=await loadData("myamk-users")||{};
      const usernames=Object.keys(allUsers);
      let allVals=[];
      for(const uname of usernames){
        const farms=await loadData(`myamk-farms-${uname}`);
        if(!farms)continue;
        for(const f of farms){
          if(f.bidangUsaha!==sel)continue;
          const ca=calcCartaAlir(f);const amk=calcAMK(f,ca);
          const bibit=n(f.dataAsas.purataBibit),jAnak=n(f.dataAsas.jAnak_J)+n(f.dataAsas.jAnak_B);
          const tM=n(f.kematian.anakJ_6)+n(f.kematian.anakJ_12)+n(f.kematian.anakB_6)+n(f.kematian.anakB_12);
          let v=[1,bibit,bibit>0?jAnak/bibit*100:0];
          if(isKecil(sel))v.push(0);
          v.push(n(f.dataAsas.selangKelahiran),jAnak>0?tM/jAnak*100:0,n(f.dataAsas.beratJ),n(f.hasil.hargaJ),n(f.dataAsas.beratB),n(f.hasil.hargaB));
          if(isTenusu(sel))v.push(bibit>0?n(f.tenusu.susuTahun)/bibit:0,n(f.tenusu.hargaSusu));
          v.push(amk.totalHasil,amk.totalKB1,amk.MK1,amk.totalKB2,amk.MK2,amk.mkJam,amk.pendapatanLadang,amk.pendapatanBulanan);
          allVals.push({user:uname,farm:f.nama,tahun:f.tahun,vals:v});
        }
      }
      if(allVals.length===0){setCompileResult({count:0,avg:[]});return;}
      const avg=allVals[0].vals.map((_,i)=>{const s=allVals.reduce((a,v)=>a+(v.vals[i]||0),0);return s/allVals.length;});
      avg[0]=allVals.length; // Bilangan Ladang = count
      setCompileResult({count:allVals.length,avg,details:allVals});
    }catch(e){console.error(e);}
  };

  const exportKeb=()=>{
    const data={bidangUsaha:sel,indeksKebangsaan:baseData,custom:customForBidang,compiled:compileResult};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`IndeksKebangsaan_${sel}_${new Date().getFullYear()}.json`;a.click();URL.revokeObjectURL(url);
  };

  return(<div>
    <Card title="INDEKS KEBANGSAAN" icon="🌐" accent={P[800]}>
      <SelectField label="PILIH BIDANG USAHA" value={sel} onChange={v=>{setSel(v);setCompileResult(null);setShowAdd(false);}} options={allBidang}/>

      {sel&&<div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        <button onClick={()=>{setShowAdd(!showAdd);if(!showAdd&&baseData)setNewVals(baseData.params.map(()=>""));}} style={{padding:"6px 14px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${P[500]},${P[600]})`,color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer"}}>+ TAMBAH INDEKS TAHUN BARU</button>
        <button onClick={compileFromUsers} style={{padding:"6px 14px",borderRadius:8,border:"none",background:`linear-gradient(135deg,#2563eb,#1d4ed8)`,color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer"}}>COMPILE DARI SEMUA USER</button>
        <button onClick={()=>setShowSubmissions(!showSubmissions)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#059669,#047857)",color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer",position:"relative"}}>📥 DATA DITERIMA {submissions.filter(s=>s.bidangUsaha===sel).length>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:8,marginLeft:4}}>{submissions.filter(s=>s.bidangUsaha===sel).length}</span>}</button>
        <label style={{padding:"6px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>📂 IMPORT FAIL USER<input type="file" accept=".json" style={{display:"none"}} onChange={async(e)=>{try{const file=e.target.files[0];if(!file)return;const text=await file.text();const data=JSON.parse(text);if(data.username&&data.bidangUsaha&&data.indeksData){const subs=[...submissions,data];setSubmissions(subs);await saveData("myamk-submissions-shared",subs);setSentImportMsg("✓ FAIL BERJAYA DIIMPORT: "+data.nama+" ("+data.farmNama+")");}else{setSentImportMsg("FORMAT FAIL TIDAK SAH");}e.target.value="";}catch(err){setSentImportMsg("RALAT MEMBACA FAIL");}}}/></label>
        <button onClick={exportKeb} style={{padding:"6px 14px",borderRadius:8,border:`2px solid ${P[300]}`,background:"transparent",color:P[600],fontWeight:600,fontSize:10,cursor:"pointer"}}>EKSPORT</button>
      </div>}
      {sentImportMsg&&<div style={{background:sentImportMsg.includes("✓")?"#dcfce7":"#fee2e2",border:`1px solid ${sentImportMsg.includes("✓")?"#86efac":"#fca5a5"}`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:10,fontWeight:600,color:sentImportMsg.includes("✓")?"#166534":"#991b1b"}}>{sentImportMsg}</div>}

      {/* DATA DITERIMA DARI USER */}
      {showSubmissions&&sel&&(()=>{
        const filtered=submissions.filter(s=>s.bidangUsaha===sel);
        const deleteSubmission=async(id)=>{const ns=submissions.filter(s=>s.id!==id);setSubmissions(ns);await saveData("myamk-submissions-shared",ns);};
        const compileSubmissions=()=>{
          if(filtered.length===0)return;
          let allVals=[];
          filtered.forEach(sub=>{sub.indeksData.forEach(d=>{if(d.vals)allVals.push(d.vals);});});
          if(allVals.length===0){setCompileResult({count:0,avg:[]});return;}
          const avg=allVals[0].map((_,i)=>{const s=allVals.reduce((a,v)=>a+(v[i]||0),0);return s/allVals.length;});
          avg[0]=allVals.length;
          setCompileResult({count:allVals.length,avg,details:filtered.map(s=>({user:s.username,farm:s.farmNama,tahun:s.tahun}))});
        };
        return(<div style={{background:"#f0fdf4",borderRadius:10,padding:12,marginBottom:10,border:"1px solid #86efac"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#166534"}}>📥 DATA DITERIMA DARI USER ({filtered.length})</div>
            {filtered.length>0&&<button onClick={compileSubmissions} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"#059669",color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>COMPILE DATA INI</button>}
          </div>
          {filtered.length===0?<div style={{fontSize:9,color:"#888"}}>TIADA DATA DITERIMA UNTUK BIDANG USAHA INI</div>:
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {filtered.map(s=>(<div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:8,background:"#fff",border:"1px solid #d1fae5"}}>
              <div><div style={{fontSize:10,fontWeight:600,color:"#166534"}}>{s.nama} (@{s.username})</div><div style={{fontSize:8,color:"#888"}}>LADANG: {s.farmNama} • TAHUN: {s.tahun} • DIHANTAR: {new Date(s.submittedAt).toLocaleDateString()}</div><div style={{fontSize:8,color:"#059669"}}>{s.indeksData.length} REKOD INDEKS</div></div>
              <button onClick={()=>deleteSubmission(s.id)} style={{background:"#fee2e2",border:"none",borderRadius:6,padding:4,cursor:"pointer"}}><Icon name="trash" size={10} color="#dc2626"/></button>
            </div>))}
          </div>}
        </div>);
      })()}

      {/* Add new year form */}
      {showAdd&&baseData&&<div style={{background:P[50],borderRadius:10,padding:12,marginBottom:10,border:`1px solid ${P[200]}`}}>
        <div style={{fontSize:10,fontWeight:700,color:P[700],marginBottom:6}}>TAMBAH INDEKS KEBANGSAAN TAHUN BARU</div>
        <Field label="TAHUN" value={newYear} onChange={setNewYear} type="text" placeholder="CTH: 2026"/>
        <div style={{maxHeight:300,overflowY:"auto"}}>
          {baseData.params.map((p,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:6,marginBottom:2}}>
            <div style={{fontSize:9,color:P[600],paddingTop:8}}>{p.p}</div>
            <input style={{...iSt,fontSize:11,padding:"6px 8px"}} type="number" value={newVals[i]||""} onChange={e=>{const nv=[...newVals];nv[i]=e.target.value;setNewVals(nv);}} placeholder="0"/>
          </div>))}
        </div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <button onClick={addNewIndeks} style={{padding:"6px 14px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${G.ok},#059669)`,color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer"}}>SIMPAN</button>
          <button onClick={()=>setShowAdd(false)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${P[300]}`,background:"transparent",color:P[600],fontWeight:600,fontSize:10,cursor:"pointer"}}>BATAL</button>
        </div>
      </div>}

      {/* Compile result */}
      {compileResult&&<div style={{background:"#eff6ff",borderRadius:10,padding:12,marginBottom:10,border:"1px solid #93c5fd"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#2563eb",marginBottom:4}}>HASIL COMPILE: {compileResult.count} LADANG DARI SEMUA USER</div>
        {compileResult.count===0?<div style={{fontSize:9,color:"#888"}}>TIADA DATA DITEMUI UNTUK BIDANG USAHA INI</div>:
        <div style={{fontSize:9,color:"#6b7280"}}>PURATA TELAH DIKIRA DARI {compileResult.count} REKOD LADANG. BOLEH SIMPAN SEBAGAI INDEKS KEBANGSAAN BARU.</div>}
        {compileResult.count>0&&<button onClick={()=>{const yr=prompt("SIMPAN SEBAGAI INDEKS KEBANGSAAN TAHUN?");if(!yr)return;const entry={tahun:parseInt(yr),params:baseData.params.map((p,i)=>({...p,v:compileResult.avg[i]||0}))};const updated={...customIndeks,[sel]:[...(customIndeks[sel]||[]),entry]};saveCustom(updated);setCompileResult(null);}} style={{marginTop:6,padding:"5px 12px",borderRadius:6,border:"none",background:"#2563eb",color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>SIMPAN SEBAGAI INDEKS KEBANGSAAN</button>}
      </div>}

      {/* Default indeks table */}
      {baseData&&<div style={{overflowX:"auto",marginTop:8}}>
        <div style={{background:`linear-gradient(135deg,${P[700]},${P[900]})`,color:"#fff",padding:"8px 12px",borderRadius:"10px 10px 0 0",fontWeight:700,fontSize:11}}>INDEKS KEBANGSAAN — {sel}</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}>
          <thead><tr style={{background:P[100]}}>
            <th style={{padding:"6px 4px",textAlign:"left"}}>NO</th>
            <th style={{padding:"6px 4px",textAlign:"left"}}>PARAMETER</th>
            <th style={{padding:"6px 4px",textAlign:"left"}}>UNIT</th>
            <th style={{padding:"6px 4px",textAlign:"right"}}>{baseData.tahun}</th>
            {customForBidang.map((c,i)=>(<th key={i} style={{padding:"6px 4px",textAlign:"right",color:P[600]}}>{c.tahun} <button onClick={()=>deleteCustomIndeks(i)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:8}}>✕</button></th>))}
          </tr></thead>
          <tbody>{baseData.params.map((p,i)=>(<tr key={i} style={{borderBottom:`1px solid ${P[50]}`,background:i%2===0?"#fff":P[50]}}>
            <td style={{padding:"5px 4px"}}>{i+1}</td>
            <td style={{padding:"5px 4px",fontWeight:500}}>{p.p}</td>
            <td style={{padding:"5px 4px",color:"#888"}}>{p.u}</td>
            <td style={{padding:"5px 4px",textAlign:"right",fontWeight:700,color:P[700]}}>{fmt(p.v)}</td>
            {customForBidang.map((c,ci)=>(<td key={ci} style={{padding:"5px 4px",textAlign:"right",fontWeight:600,color:P[500]}}>{c.params[i]?fmt(c.params[i].v):"-"}</td>))}
          </tr>))}</tbody>
        </table>
      </div>}
    </Card>
  </div>);
};

// URUS PENGGUNA (Admin only)
const UrusPengguna=()=>{
  const [users,setUsers]=useState({});
  const [loading2,setLoading2]=useState(true);
  const [actionMsg,setActionMsg]=useState("");
  useEffect(()=>{(async()=>{const u=await loadData("myamk-users")||{};setUsers(u);setLoading2(false);})();},[]);
  const updateUser=async(uname,updates)=>{const u={...users,[uname]:{...users[uname],...updates}};setUsers(u);await saveData("myamk-users",u);};
  const deleteUser=async(uname)=>{if(uname==="admin")return;const u={...users};delete u[uname];setUsers(u);await saveData("myamk-users",u);setActionMsg(`PENGGUNA ${uname} DIPADAM`);setTimeout(()=>setActionMsg(""),2000);};

  const pending=Object.entries(users).filter(([_,u])=>u.pendingAdmin);
  const allUsers=Object.entries(users).filter(([k])=>k!=="admin");

  return(<div>
    {/* PERMOHONAN ADMIN */}
    {pending.length>0&&<Card title={`⏳ PERMOHONAN ADMIN (${pending.length})`} icon="🔔" accent="#f59e0b">
      {pending.map(([uname,u])=>(<div key={uname} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:8,background:"#fef3c7",border:"1px solid #fde68a",marginBottom:6}}>
        <div><div style={{fontSize:11,fontWeight:700,color:"#92400e"}}>{u.nama}</div><div style={{fontSize:9,color:"#a16207"}}>@{uname}</div></div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={async()=>{await updateUser(uname,{isAdmin:true,pendingAdmin:false});setActionMsg(`✓ ${u.nama} DILULUSKAN SEBAGAI ADMIN`);setTimeout(()=>setActionMsg(""),2000);}} style={{padding:"5px 10px",borderRadius:6,border:"none",background:"#059669",color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>✓ LULUS</button>
          <button onClick={async()=>{await updateUser(uname,{isAdmin:false,pendingAdmin:false});setActionMsg(`${u.nama} DITOLAK`);setTimeout(()=>setActionMsg(""),2000);}} style={{padding:"5px 10px",borderRadius:6,border:"none",background:"#ef4444",color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>✕ TOLAK</button>
        </div>
      </div>))}

    {/* SENARAI PENGGUNA */}
    <Card title="SENARAI PENGGUNA" icon="👥" accent={P[600]}>
      {actionMsg&&<div style={{background:actionMsg.includes("✓")?"#dcfce7":"#fee2e2",borderRadius:6,padding:"6px 10px",marginBottom:8,fontSize:9,fontWeight:600,color:actionMsg.includes("✓")?"#166534":"#991b1b"}}>{actionMsg}</div>}
      {loading2?<p style={{fontSize:10,color:"#888"}}>MEMUATKAN...</p>:
      <div>{allUsers.map(([uname,u])=>(<div key={uname} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,background:u.pendingAdmin?"#fef3c7":u.isAdmin?P[50]:"#fff",border:`1px solid ${u.pendingAdmin?"#fde68a":u.isAdmin?P[200]:P[100]}`,marginBottom:4}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:P[800]}}>{u.nama} <span style={{fontSize:9,color:"#888"}}>@{uname}</span></div>
          <div style={{fontSize:9,marginTop:2}}>
            {u.pendingAdmin&&<span style={{background:"#fbbf24",color:"#fff",padding:"1px 6px",borderRadius:8,fontSize:8,fontWeight:600}}>PENDING</span>}
            {u.isAdmin&&!u.pendingAdmin&&<span style={{background:P[600],color:"#fff",padding:"1px 6px",borderRadius:8,fontSize:8,fontWeight:600}}>ADMIN</span>}
            {!u.isAdmin&&!u.pendingAdmin&&<span style={{background:"#6b7280",color:"#fff",padding:"1px 6px",borderRadius:8,fontSize:8,fontWeight:600}}>USER</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:3}}>
          {!u.isAdmin&&!u.pendingAdmin&&<button onClick={()=>updateUser(uname,{isAdmin:true})} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${P[300]}`,background:P[50],color:P[700],fontSize:8,fontWeight:600,cursor:"pointer"}}>JADIKAN ADMIN</button>}
          {u.isAdmin&&!u.superAdmin&&<button onClick={()=>updateUser(uname,{isAdmin:false})} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #fca5a5",background:"#fff",color:"#ef4444",fontSize:8,fontWeight:600,cursor:"pointer"}}>BUANG ADMIN</button>}
          {!u.superAdmin&&<button onClick={()=>deleteUser(uname)} style={{background:"#fee2e2",border:"none",borderRadius:6,padding:4,cursor:"pointer"}}><Icon name="trash" size={10} color="#dc2626"/></button>}
        </div>
      </div>))}</div>}
    </Card>
  </div>);
};

const Profil=({user,onLogout})=>{
  const [backupMsg,setBackupMsg]=useState("");
  return(<div>
    <Card><div style={{textAlign:"center",padding:"12px 0"}}><div style={{width:70,height:70,borderRadius:"50%",background:`linear-gradient(135deg,${P[400]},${P[700]})`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:10,boxShadow:`0 6px 20px ${P[500]}40`}}><Icon name="user" size={32} color="#fff"/></div><h2 style={{fontSize:20,fontWeight:800,color:P[800],margin:0}}>{user.nama}</h2><p style={{color:"#888",fontSize:12}}>@{user.username}</p>{user.isAdmin&&<span style={{background:`linear-gradient(135deg,${P[500]},${P[700]})`,color:"#fff",padding:"3px 12px",borderRadius:16,fontSize:10,fontWeight:700}}>ADMIN</span>}</div></Card>
    {/* ADMIN: URUS PENGGUNA */}
    {user.isAdmin&&<UrusPengguna/>}

    {/* SIMPAN & MUAT DATA */}
    <Card title="PENGURUSAN DATA" icon="💾" accent="#2563eb">
      <p style={{fontSize:10,color:"#888",marginBottom:8}}>SIMPAN SEMUA DATA KE FAIL UNTUK BACKUP. MUAT SEMULA DARI FAIL BACKUP UNTUK PULIHKAN DATA.</p>
      {backupMsg&&<div style={{background:backupMsg.includes("✓")?"#dcfce7":"#fee2e2",borderRadius:6,padding:"6px 10px",marginBottom:8,fontSize:9,fontWeight:600,color:backupMsg.includes("✓")?"#166534":"#991b1b"}}>{backupMsg}</div>}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button onClick={()=>{const ok=storage.exportAll();if(ok)setBackupMsg("✓ DATA BERJAYA DISIMPAN KE FAIL! UPLOAD KE GOOGLE DRIVE UNTUK BACKUP CLOUD.");setTimeout(()=>setBackupMsg(""),4000);}} style={{flex:1,padding:"10px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>💾 SIMPAN KE FAIL</button>
        <label style={{flex:1,padding:"10px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#059669,#047857)",color:"#fff",fontWeight:600,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>📂 MUAT DARI FAIL
          <input type="file" accept=".json" style={{display:"none"}} onChange={async(e)=>{const f=e.target.files[0];if(!f)return;try{const count=await storage.importAll(f);setBackupMsg("✓ "+count+" DATA BERJAYA DIMUAT! SILA REFRESH HALAMAN.");setTimeout(()=>setBackupMsg(""),4000);}catch(err){setBackupMsg("RALAT MEMBACA FAIL");}e.target.value="";}}/>
        </label>
      </div>
      <p style={{fontSize:8,color:"#a78bfa",marginTop:6}}>SIMPAN KE FAIL → HANTAR/UPLOAD MELALUI EMAIL / WHATSAPP / GOOGLE DRIVE</p>
    </Card>

    <Card title="MENGENAI myAMK" icon="ℹ️"><p style={{fontSize:12,color:"#666",lineHeight:1.6}}>myAMK ADALAH APLIKASI UNTUK MEMUDAHKAN PENGIRAAN DAN DOKUMENTASI ANALISA MARGIN KASAR (AMK) BAGI SEKTOR PENTERNAKAN DI MALAYSIA.</p></Card>
    <button onClick={onLogout} style={{width:"100%",padding:12,borderRadius:12,border:"none",background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 6px 20px rgba(239,68,68,0.3)"}}><Icon name="logout" size={16} color="#fff"/>LOG KELUAR</button>
  </div>);
};

// MAIN APP
function App(){const[user,setUser]=useState(null);const[page,setPage]=useState("data");const[farms,setFarms]=useState([]);const[activeFarmId,setActiveFarmId]=useState(null);const[loading,setLoading]=useState(true);const[showFS,setShowFS]=useState(false);const[saveMsg,setSaveMsg]=useState("");
useEffect(()=>{(async()=>{try{const s=await loadData("myamk-session");if(s)setUser(s);}catch(e){}setLoading(false);})();},[]);
useEffect(()=>{if(!user)return;(async()=>{try{const d=await loadData(`myamk-farms-${user.username}`);if(d&&d.length>0){setFarms(d);setActiveFarmId(d[0].id);}else{const nf=emptyFarm();setFarms([nf]);setActiveFarmId(nf.id);}}catch(e){const nf=emptyFarm();setFarms([nf]);setActiveFarmId(nf.id);}})();},[user]);
const handleLogin=async u=>{setUser(u);await saveData("myamk-session",u);};
const handleLogout=async()=>{setUser(null);setFarms([]);setActiveFarmId(null);try{storage.del("myamk-session");}catch(e){}};
const activeFarm=farms.find(f=>f.id===activeFarmId)||farms[0]||emptyFarm();
const setFarm=updater=>setFarms(prev=>prev.map(f=>f.id===activeFarmId?(typeof updater==='function'?updater(f):updater):f));
const handleSave=async()=>{try{await saveData(`myamk-farms-${user.username}`,farms);setSaveMsg("✓");setTimeout(()=>setSaveMsg(""),2000);}catch(e){setSaveMsg("RALAT");}};
const addFarm=()=>{const nf=emptyFarm();setFarms(prev=>[...prev,nf]);setActiveFarmId(nf.id);setShowFS(false);};
const duplicateFarm=(id)=>{const src=farms.find(f=>f.id===id);if(!src)return;const copy=JSON.parse(JSON.stringify(src));copy.id=Date.now().toString();copy.nama=src.nama?`${src.nama} (SALINAN)`:"SALINAN";setFarms(prev=>[...prev,copy]);setActiveFarmId(copy.id);};
const deleteFarm=id=>{if(farms.length<=1)return;const nf=farms.filter(f=>f.id!==id);setFarms(nf);if(activeFarmId===id)setActiveFarmId(nf[0].id);};
if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${P[100]},${P[50]})`}}><div style={{textAlign:"center"}}><LogoSVG size={60}/><p style={{color:P[600],marginTop:10,fontWeight:600}}>MEMUATKAN myAMK...</p></div></div>);
if(!user)return <LoginPage onLogin={handleLogin}/>;
const navItems=[{id:"data",label:"DATA",icon:"home"},{id:"carta",label:"CARTA ALIR",icon:"flow"},{id:"amk",label:"AMK",icon:"calc"},{id:"indeks",label:"INDEKS",icon:"index"},...(user.isAdmin?[{id:"kebangsaan",label:"INDEKS KEBANGSAAN",icon:"globe"}]:[]),{id:"profil",label:"PROFIL",icon:"user"}];
return(<div style={{fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",minHeight:"100vh",background:`linear-gradient(180deg,${P[50]} 0%,#fff 30%,${P[50]} 100%)`,color:"#1e1b4b",display:"flex",flexDirection:"column"}}>
  <div style={{background:`linear-gradient(135deg,${P[600]},${P[800]},${P[900]})`,color:"#fff",padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,boxShadow:`0 4px 24px ${P[700]}50`}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}><LogoSmall size={30}/><div><div style={{fontWeight:800,fontSize:14}}>myAMK</div><div style={{fontSize:9,opacity:0.7}}>{activeFarm.nama||"LADANG BARU"}</div></div></div>
    <div style={{display:"flex",gap:4,alignItems:"center"}}>{saveMsg&&<span style={{fontSize:9,background:"rgba(255,255,255,0.2)",padding:"2px 6px",borderRadius:6,fontWeight:600}}>{saveMsg}</span>}<button onClick={handleSave} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:8,padding:"6px 10px",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:3,fontSize:10,fontWeight:600}}><Icon name="save" size={12} color="#fff"/>SIMPAN</button><button onClick={()=>setShowFS(!showFS)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:8,padding:"6px 8px",color:"#fff",cursor:"pointer"}}><Icon name="folder" size={12} color="#fff"/></button></div>
  </div>
  {showFS&&<div style={{background:"#fff",borderBottom:`2px solid ${P[200]}`,padding:12,boxShadow:`0 4px 20px ${P[200]}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontWeight:700,color:P[800],fontSize:13}}>REKOD LADANG</span><button onClick={addFarm} style={{padding:"5px 12px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${P[500]},${P[600]})`,color:"#fff",fontWeight:600,fontSize:11,cursor:"pointer"}}>+ BARU</button></div>
    {farms.map(f=>(<div key={f.id} onClick={()=>{setActiveFarmId(f.id);setShowFS(false);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:10,marginBottom:4,background:f.id===activeFarmId?`linear-gradient(135deg,${P[100]},${P[50]})`:P[50],cursor:"pointer",border:f.id===activeFarmId?`2px solid ${P[300]}`:"2px solid transparent"}}><div><div style={{fontWeight:600,fontSize:11,color:P[800]}}>{f.nama||"TANPA NAMA"}</div><div style={{fontSize:9,color:"#888"}}>{f.bidangUsaha||"BELUM DIPILIH"} • {f.tahun}</div></div><div style={{display:"flex",gap:3}}><button onClick={e=>{e.stopPropagation();duplicateFarm(f.id);}} style={{background:"#dbeafe",border:"none",borderRadius:6,padding:4,cursor:"pointer",fontSize:8,color:"#2563eb",fontWeight:700}} title="SALIN">📋</button>{farms.length>1&&<button onClick={e=>{e.stopPropagation();deleteFarm(f.id);}} style={{background:"#fee2e2",border:"none",borderRadius:6,padding:4,cursor:"pointer"}}><Icon name="trash" size={10} color="#dc2626"/></button>}</div></div>))}
  </div>}
  <div style={{flex:1,padding:"12px",paddingBottom:"70px",maxWidth:960,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
    {page==="data"&&<DataTernakan farm={activeFarm} setFarm={setFarm} onDuplicate={()=>duplicateFarm(activeFarmId)}/>}
    {page==="carta"&&<CartaAlir farm={activeFarm}/>}
    {page==="amk"&&<KiraanAMK farm={activeFarm}/>}
    {page==="indeks"&&<IndeksLadang farm={activeFarm} allFarms={farms} user={user}/>}
    {page==="kebangsaan"&&user.isAdmin&&<IndeksKebangsaan user={user}/>}
    {page==="profil"&&<Profil user={user} onLogout={handleLogout}/>}
  </div>
  <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.95)",borderTop:`1px solid ${P[200]}`,display:"flex",justifyContent:"space-around",padding:"4px 0",zIndex:50,backdropFilter:"blur(20px)",boxShadow:`0 -4px 24px ${P[200]}60`}}>
    {navItems.map(item=>(<button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"4px 6px",borderRadius:10,background:page===item.id?`linear-gradient(135deg,${P[100]},${P[200]})`:"transparent",color:page===item.id?P[700]:"#9ca3af",cursor:"pointer",border:"none",fontSize:8,fontWeight:page===item.id?700:500,transition:"all 0.2s",maxWidth:70}}><Icon name={item.icon} size={16} color={page===item.id?P[700]:"#9ca3af"}/><span style={{lineHeight:1.1}}>{item.label}</span></button>))}
  </div>
  <style>{`*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:${P[50]}}::-webkit-scrollbar-thumb{background:${P[300]};border-radius:3px}`}</style>
</div>);}


// RENDER
ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
